<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 560" width="500" height="560">
  <defs>
    <filter id="glow-sm" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-80%" y="-20%" width="260%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="beam-glow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wave-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%"   stop-color="#1A1A4E"/>
      <stop offset="100%" stop-color="#04040F"/>
    </radialGradient>
    <radialGradient id="sun-disc" cx="38%" cy="35%" r="62%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="30%"  stop-color="#FFF9C4"/>
      <stop offset="70%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </radialGradient>
    <radialGradient id="earth" cx="35%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="560" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="38"  cy="28"  r="1.5" fill="white" opacity="0.9"/>
  <circle cx="290" cy="14"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="420" cy="22"  r="2"   fill="white" opacity="0.8"/>
  <circle cx="465" cy="75"  r="1.5" fill="white" opacity="0.6"/>
  <circle cx="485" cy="155" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="450" cy="400" r="1"   fill="white" opacity="0.5"/>
  <circle cx="475" cy="460" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="22"  cy="160" r="1"   fill="white" opacity="0.5"/>
  <circle cx="18"  cy="380" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="50"  cy="460" r="1"   fill="white" opacity="0.3"/>
  <circle cx="250" cy="30"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="148" cy="18"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="300" cy="490" r="1"   fill="white" opacity="0.4"/>
  <circle cx="60"  cy="50"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="430" cy="490" r="1.5" fill="white" opacity="0.3"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SUN — left side, center (120, 270)                    -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Outer diffuse corona -->
  <circle cx="120" cy="270" r="115" fill="#FFD700" opacity="0.05" filter="url(#glow-lg)"/>
  <circle cx="120" cy="270" r="95"  fill="#FFB300" opacity="0.08" filter="url(#glow-lg)"/>

  <!-- 16 triangular rays -->
  <g transform="translate(120, 270)" fill="#FFD700">
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.95"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.85" transform="rotate(22.5)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.95" transform="rotate(45)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.85" transform="rotate(67.5)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.95" transform="rotate(90)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.85" transform="rotate(112.5)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.95" transform="rotate(135)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.85" transform="rotate(157.5)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.95" transform="rotate(180)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.85" transform="rotate(202.5)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.95" transform="rotate(225)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.85" transform="rotate(247.5)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.95" transform="rotate(270)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.85" transform="rotate(292.5)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.95" transform="rotate(315)"/>
    <polygon points="0,-80  -11,-112  11,-112" opacity="0.85" transform="rotate(337.5)"/>
  </g>

  <!-- Sun disc -->
  <circle cx="120" cy="270" r="70" fill="url(#sun-disc)" stroke="#E65100" stroke-width="2"/>
  <circle cx="120" cy="270" r="55" fill="none" stroke="white" stroke-width="3" opacity="0.18"/>
  <ellipse cx="100" cy="250" rx="28" ry="18" fill="white" opacity="0.22" transform="rotate(-25, 100, 250)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SOUND WAVES — concentric arcs from sun toward Earth   -->
  <!-- Arcs centered at (120,270), spanning ±65° from right  -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- r=95:  (160, 184) → (160, 356) -->
  <path d="M 160 184 A 95 95 0 0 1 160 356"
        fill="none" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"
        opacity="0.90" filter="url(#wave-glow)"/>
  <!-- r=130: (175, 152) → (175, 388) -->
  <path d="M 175 152 A 130 130 0 0 1 175 388"
        fill="none" stroke="#FFD700" stroke-width="3.0" stroke-linecap="round"
        opacity="0.72" filter="url(#wave-glow)"/>
  <!-- r=165: (190, 121) → (190, 419) -->
  <path d="M 190 121 A 165 165 0 0 1 190 419"
        fill="none" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"
        opacity="0.54"/>
  <!-- r=200: (205, 89) → (205, 451) -->
  <path d="M 205 89 A 200 200 0 0 1 205 451"
        fill="none" stroke="#FFD700" stroke-width="2.0" stroke-linecap="round"
        opacity="0.36"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LASER BEAMS — outside the waves, flanking them        -->
  <!-- Sun surface at ±80° from horizontal → Earth           -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Upper beam -->
  <line x1="132" y1="201" x2="355" y2="230"
        stroke="#00E5FF" stroke-width="26" opacity="0.07" filter="url(#beam-glow)"/>
  <line x1="132" y1="201" x2="355" y2="230"
        stroke="#00E5FF" stroke-width="9"  opacity="0.42"/>
  <line x1="132" y1="201" x2="355" y2="230"
        stroke="white"   stroke-width="2.5" opacity="0.96"/>

  <!-- Lower beam -->
  <line x1="132" y1="339" x2="355" y2="310"
        stroke="#00E5FF" stroke-width="26" opacity="0.07" filter="url(#beam-glow)"/>
  <line x1="132" y1="339" x2="355" y2="310"
        stroke="#00E5FF" stroke-width="9"  opacity="0.42"/>
  <line x1="132" y1="339" x2="355" y2="310"
        stroke="white"   stroke-width="2.5" opacity="0.96"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- EARTH — right side, center (385, 270)                 -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <circle cx="385" cy="270" r="82" fill="#00E5FF" opacity="0.05" filter="url(#glow-lg)"/>
  <circle cx="385" cy="270" r="70" fill="url(#earth)" stroke="#1A237E" stroke-width="2.5"/>

  <!-- Continents -->
  <path d="M 331 240 Q 339 224, 357 232 Q 369 237, 365 252 Q 353 264, 333 256 Z" fill="#2E7D32"/>
  <path d="M 343 260 Q 351 253, 360 260 Q 365 275, 355 288 Q 343 291, 340 276 Z" fill="#2E7D32"/>
  <path d="M 387 230 Q 401 222, 414 232 Q 423 244, 415 260 Q 404 277, 391 278 Q 377 274, 375 258 Q 373 242, 387 230 Z" fill="#2E7D32"/>
  <path d="M 414 232 Q 435 224, 447 238 Q 451 250, 440 258 Q 426 264, 412 254 Z" fill="#2E7D32"/>
  <path d="M 432 268 Q 445 263, 449 272 Q 447 282, 435 284 Q 427 279, 428 270 Z" fill="#2E7D32"/>

  <!-- Atmosphere rim + specular -->
  <circle cx="385" cy="270" r="70" fill="none" stroke="#42A5F5" stroke-width="5" opacity="0.30"/>
  <path d="M 329 234 Q 349 214, 379 208"
        fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.13"/>

  <!-- Laser impact ripples — upper beam -->
  <circle cx="355" cy="230" r="8"  fill="none" stroke="#00E5FF" stroke-width="2.5" opacity="0.90" filter="url(#glow-sm)"/>
  <circle cx="355" cy="230" r="16" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.60"/>
  <circle cx="355" cy="230" r="25" fill="none" stroke="#00E5FF" stroke-width="1"   opacity="0.30"/>

  <!-- Laser impact ripples — lower beam -->
  <circle cx="355" cy="310" r="8"  fill="none" stroke="#00E5FF" stroke-width="2.5" opacity="0.90" filter="url(#glow-sm)"/>
  <circle cx="355" cy="310" r="16" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.60"/>
  <circle cx="355" cy="310" r="25" fill="none" stroke="#00E5FF" stroke-width="1"   opacity="0.30"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- GREEK INSCRIPTION (Septuagint)                        -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="250" y="546"
        text-anchor="middle"
        font-family="'Palatino Linotype', Palatino, 'Book Antiqua', serif"
        font-size="15"
        fill="#B0BEC5"
        letter-spacing="1">ὁ ἔχων ὦτα ἀκουέτω·  ὁ ἔχων ὀφθαλμοὺς βλεπέτω.</text>
</svg>
